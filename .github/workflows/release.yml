name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (example: 0.2.0)
        required: true
        type: string
      tokens_version:
        description: Published @fuggetlenfe/tokens version required for docs builds
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      TOKENS_VERSION: ${{ inputs.tokens_version }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      DOCS_REPO_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply release version
        run: |
          npm version "$VERSION" --no-git-tag-version
          npm pkg set devDependencies.@fuggetlenfe/tokens="^$TOKENS_VERSION"

      - name: Install dependencies
        run: npm install

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build Storybook
        run: npm run build-storybook

      - name: Collect documented versions
        id: versions
        run: |
          TAG_VERSIONS="$(git tag --list 'v*' | sed 's/^v//' | paste -sd, -)"
          if [ -n "$TAG_VERSIONS" ]; then
            echo "docs_versions=$TAG_VERSIONS,$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "docs_versions=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Build docs site
        env:
          DOCS_BASE_PATH: /${{ github.event.repository.name }}
          DOCS_VERSIONS: ${{ steps.versions.outputs.docs_versions }}
        run: npm run build:docs-site

      - name: Commit version bump
        run: |
          git add package.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi
          git commit -m "release: v$VERSION"
          git tag "v$VERSION"

      - name: Publish package
        run: npm publish --access public --provenance

      - name: Push release commit and tag
        run: git push origin main --follow-tags

      - name: Deploy versioned docs
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          keep_files: true
